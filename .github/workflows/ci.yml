name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Run e2e tests (Playwright)
        run: npx playwright test --reporter=dot

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run truffleHog scan
        uses: trufflesecurity/trufflehog-action@v2
        with:
          paths: '.'
          silent: false
        # do not fail the job by default; fail on PR review if configured
