name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      SKIP_DB_DURING_BUILD: true
      PRISMA_MAX_CONCURRENT: 1
      BA_TIMEOUT_MS: 2000
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Build application
        run: npm run build
      - name: Start application
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/khalfajobs-app.log 2>&1 &
      - name: Wait for health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/health >/tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          cat /tmp/khalfajobs-app.log || true
          exit 1
      - name: Run HTTP smoke tests
        run: |
          curl -fsS http://127.0.0.1:3000/ | grep -q "KhalfaJobs"
          curl -fsS http://127.0.0.1:3000/health | grep -q '"status":"ok"'
          curl -sS -o /tmp/cron.json -w "%{http_code}" http://127.0.0.1:3000/api/cron/agents | grep -q "^401$"
          cat /tmp/cron.json | grep -q "Ungueltiger Cron-Schluessel"

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run truffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
